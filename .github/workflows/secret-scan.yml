name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - chore/security-cleanup-pr1

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks OSS CLI
        run: |
          set -euo pipefail
          curl -fsSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks on current tree
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner

      - name: Run Gitleaks on changed commits
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          elif [[ -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            range="${PUSH_BEFORE_SHA}..${CURRENT_SHA}"
          else
            range="${CURRENT_SHA}^..${CURRENT_SHA}"
          fi

          gitleaks git . --config .gitleaks.toml --log-opts="$range" --redact --no-banner
