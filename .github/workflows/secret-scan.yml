name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - chore/security-cleanup-pr1

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks OSS CLI
        run: |
          set -euo pipefail
          curl -fsSLo gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --log-opts="--all" --redact --no-banner
